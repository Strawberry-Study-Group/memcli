name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: memcore-Linux-x86_64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: memcore-Darwin-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: memcore-Darwin-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: memcore-Windows-x86_64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --features embedding --target ${{ matrix.target }}

      - name: Package release archive
        shell: bash
        run: |
          ARCHIVE_NAME="${{ matrix.name }}"
          # Strip .exe suffix for archive base name
          BASE_NAME="${ARCHIVE_NAME%.exe}"

          mkdir -p staging
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/memcore.exe staging/
          else
            cp target/${{ matrix.target }}/release/memcore staging/
          fi

          # Bundle model files if present
          if [ -d models ]; then
            cp -r models staging/
          fi

          # Create tar.gz (or zip for Windows)
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cd staging && 7z a -tzip "../${BASE_NAME}.zip" . && cd ..
          else
            tar -czf "${BASE_NAME}.tar.gz" -C staging .
          fi

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.tar.gz
            *.zip
